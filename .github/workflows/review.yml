name: Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get PR changes
        run: |
          echo "## PR Changes" >> $GITHUB_STEP_SUMMARY
          git diff main...HEAD --stat >> $GITHUB_STEP_SUMMARY
      
      - name: Check code quality
        run: |
          pip install flake8
          flake8 scripts/ --max-line-length=120 --ignore=E501,W503 --exit-zero
      
      - name: Add review comment
        if: github.event_name == 'pull_request'
        run: |
          echo "✅ Code review passed" >> $GITHUB_STEP_SUMMARY

  auto-approve:
    runs-on: ubuntu-latest
    needs: review
    if: github.actor == 'github-actions[bot]'
    steps:
      - name: Auto approve
        run: |
          gh pr review --approve "$PR_URL" -b "Auto-approved by CI"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
